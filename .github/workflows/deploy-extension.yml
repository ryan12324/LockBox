name: Deploy Extension

# Store submissions should be intentional — manual trigger or version tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Which browser store to publish to'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chrome
          - firefox

concurrency:
  group: deploy-extension
  cancel-in-progress: false

# ┌───────────────────────────────────────────────────────────────────┐
# │ Required secrets:                                                 │
# │                                                                   │
# │  Chrome Web Store:                                                │
# │    CHROME_EXTENSION_ID    — from chrome.google.com/webstore       │
# │    CHROME_CLIENT_ID       — from Google Cloud Console OAuth       │
# │    CHROME_CLIENT_SECRET   — from Google Cloud Console OAuth       │
# │    CHROME_REFRESH_TOKEN   — OAuth refresh token                   │
# │                                                                   │
# │  Firefox AMO:                                                     │
# │    FIREFOX_JWT_ISSUER     — from addons.mozilla.org/developers    │
# │    FIREFOX_JWT_SECRET     — from addons.mozilla.org/developers    │
# │    FIREFOX_EXTENSION_ID   — e.g. lockbox@lockbox.dev              │
# └───────────────────────────────────────────────────────────────────┘

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared packages
        run: bun run build

      - name: Build Chrome extension
        run: bun run build
        working-directory: apps/extension

      - name: Build Firefox extension
        run: bun run build:firefox
        working-directory: apps/extension

      - name: Package Chrome extension
        run: |
          cd apps/extension/.output/chrome-mv3
          zip -r ../../../../chrome-extension.zip .

      - name: Package Firefox extension
        run: |
          cd apps/extension/.output/firefox-mv2
          zip -r ../../../../firefox-extension.zip .

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: chrome-extension.zip

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: firefox-extension.zip

  chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      inputs.target == 'all' ||
      inputs.target == 'chrome'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension

      - name: Upload to Chrome Web Store
        run: |
          npx chrome-webstore-upload-cli upload \
            --source chrome-extension.zip \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN" \
            --auto-publish
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  firefox:
    name: Publish to Firefox AMO
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      inputs.target == 'all' ||
      inputs.target == 'firefox'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: firefox-extension

      - name: Upload to Firefox AMO
        run: |
          mkdir -p source
          unzip firefox-extension.zip -d source/
          npx web-ext sign \
            --source-dir source \
            --channel listed \
            --api-key "$FIREFOX_JWT_ISSUER" \
            --api-secret "$FIREFOX_JWT_SECRET" \
            --id "$FIREFOX_EXTENSION_ID"
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
