name: Deploy Mobile

# Play Store submissions should be intentional — manual trigger or version tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: deploy-mobile
  cancel-in-progress: false

# ┌───────────────────────────────────────────────────────────────────┐
# │ Required secrets:                                                 │
# │                                                                   │
# │  Android Signing:                                                 │
# │    ANDROID_KEYSTORE         — base64-encoded .jks file            │
# │    ANDROID_KEYSTORE_PASSWORD                                      │
# │    ANDROID_KEY_ALIAS                                              │
# │    ANDROID_KEY_PASSWORD                                           │
# │                                                                   │
# │  Google Play:                                                     │
# │    PLAY_SERVICE_ACCOUNT_JSON — base64-encoded service account     │
# │                                from Google Cloud Console          │
# │                                                                   │
# │  Build Config:                                                    │
# │    vars.VITE_API_URL — API endpoint baked into the web assets     │
# └───────────────────────────────────────────────────────────────────┘

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web assets
        run: bun run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Capacitor sync
        run: npx cap sync android
        working-directory: apps/mobile

      - name: Generate Gradle wrapper (if missing)
        working-directory: apps/mobile/android
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > apps/mobile/android/app/lockbox-release.jks

      - name: Build signed AAB
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease
        env:
          LOCKBOX_KEYSTORE_FILE: app/lockbox-release.jks
          LOCKBOX_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          LOCKBOX_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          LOCKBOX_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lockbox-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab

  publish:
    name: Publish to Google Play
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: lockbox-release-aab

      - name: Decode service account
        run: echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > service-account.json

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: dev.lockbox.app
          releaseFiles: app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
